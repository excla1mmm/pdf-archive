settings:
  input_dir: Input
  archive_dir: Archive
  review_folder: _Review
  ai_new_folder: _AI_New
  unknown_year_folder: UnknownYear
  create_xml: true
  include_extracted_text: false
  recursive_input: false
  delete_source_after_success: true
  confidence_review_threshold: 0.75
  min_text_chars_before_ocr: 80
  min_document_year: 1990
  max_future_years: 1
  require_date_in_text: true
  max_pages_for_text: 6
  max_chars_for_llm: 14000

barcode:
  # Relative crop of the first page. Good starting point for "barcode in top right".
  left_ratio: 0.56
  top_ratio: 0.00
  width_ratio: 0.44
  height_ratio: 0.30
  dpi_crop: 350
  dpi_full_page_fallback: 220

ocr:
  enabled: true
  languages: deu+eng
  dpi: 260
  tesseract_config: "--oem 1 --psm 6"
  preprocess: true
  auto_rotate: true
  deskew: true
  max_deskew_degrees: 4.0
  contrast: 1.35
  sharpness: 1.15
  # Set to null to keep grayscale. Use 170-210 for aggressive binarization.
  threshold: null

llm:
  enabled: true
  provider: ollama
  base_url: http://localhost:11434
  model: gemma3:4b
  temperature: 0.1
  timeout_seconds: 180
  allow_ai_categories: true

categories:
  - id: invoice
    name: Rechnung / Счета
    folder: Rechnung
    description: Invoices, payment requests, bills, receipts with payment obligation.
    keywords: [rechnung, invoice, zahlbetrag, faellig, mwst, ust, betrag]
  - id: bank_statement
    name: Kontoauszug / Банковские выписки
    folder: Kontoauszug
    description: Bank statements, account movements, credit card statements.
    keywords: [kontoauszug, kontostand, iban, bic, umsatz, bank]
  - id: tax
    name: Steuer / Налоги
    folder: Steuer
    description: Tax office, tax returns, tax notices, VAT and income tax documents.
    keywords: [steuer, finanzamt, einkommensteuer, umsatzsteuer, bescheid]
  - id: insurance
    name: Versicherung / Страхование
    folder: Versicherung
    description: Insurance policies, claims, premium notices.
    keywords: [versicherung, police, beitrag, schaden, haftpflicht]
  - id: salary
    name: Gehalt / Зарплата
    folder: Gehalt
